name: Release Gate

on:
  pull_request:
    branches:
      - release
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  admin-ci:
    name: Admin CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.STAGE_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.STAGE_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.STAGE_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.STAGE_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGE_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.STAGE_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.STAGE_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  client-ci:
    name: Client CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.STAGE_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.STAGE_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.STAGE_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.STAGE_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGE_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.STAGE_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.STAGE_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGE_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STAGE_STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGE_STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_CLIENT_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  e2e-smoke:
    name: Cypress Smoke
    runs-on: ubuntu-latest
    needs:
      - admin-ci
      - client-ci
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.STAGE_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.STAGE_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.STAGE_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.STAGE_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGE_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.STAGE_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.STAGE_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGE_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STAGE_STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGE_STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_CLIENT_BASE_URL: http://localhost:3000
      CLIENT_BASE_URL: http://localhost:3000
      CUSTOMER_BASE_URL: http://localhost:3000
      ADMIN_BASE_URL: http://localhost:3001
      CYPRESS_CLIENT_BASE_URL: http://localhost:3000
      CYPRESS_CUSTOMER_BASE_URL: http://localhost:3000
      CYPRESS_ADMIN_BASE_URL: http://localhost:3001
      E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
      E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      CYPRESS_E2E_CUSTOMER_EMAIL: ${{ secrets.E2E_CUSTOMER_EMAIL }}
      CYPRESS_E2E_CUSTOMER_PASSWORD: ${{ secrets.E2E_CUSTOMER_PASSWORD }}
      CYPRESS_E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      CYPRESS_E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Install test dependencies
        working-directory: test
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Build admin
        working-directory: admin
        run: npm run build

      - name: Start client and admin
        run: |
          npm --prefix client run start -- -p 3000 &
          npm --prefix admin run start -- -p 3001 &
          npx --yes wait-on http://localhost:3000 http://localhost:3001

      - name: Run Cypress smoke tests
        working-directory: test
        run: |
          npm run cypress:run:auth:smoke
          npm run cypress:run:ordering:smoke
          npm run cypress:run:customer:smoke
          npm run cypress:run:admin-ops:smoke
